name: CI

permissions: {}

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@83ed61bfbe2b8abbb3c66e8b65b1335484c70009 # v1.4.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run fmt:check

      - name: Docs check
        run: pnpm run docs:update && git diff --exit-code README.md

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@83ed61bfbe2b8abbb3c66e8b65b1335484c70009 # v1.4.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm run compile

      - name: Unit Tests
        run: xvfb-run -a pnpm run test:unit

      - name: Oxlint LSP Tests
        run: xvfb-run -a pnpm run test:oxlint && xvfb-run -a pnpm run test:oxlint-multi-root

      - name: Oxlint JS Plugin Test (flaky)
        continue-on-error: true
        run: xvfb-run -a pnpm run test:oxlint-js

      - name: Oxfmt LSP Tests
        run: xvfb-run -a pnpm run test:oxfmt

  test-windows:
    if: ${{ github.ref_name == 'main' }}
    name: Test (windows)
    runs-on: windows-latest
    steps:
      - uses: taiki-e/checkout-action@83ed61bfbe2b8abbb3c66e8b65b1335484c70009 # v1.4.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm run compile

      - name: Unit Tests
        run: pnpm run test:unit

      - name: Oxlint LSP Tests
        run: pnpm run test:oxlint && pnpm run test:oxlint-multi-root

      - name: Oxlint JS Plugin Test (flaky)
        continue-on-error: true
        run: pnpm run test:oxlint-js

      - name: Oxfmt LSP Tests
        run: pnpm run test:oxfmt
